<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veterinaria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --rojo-neon: #ff0000;
            --negro-fondo: #000000;
            --negro-card: #121212;
            --input-bg: #1a1a1a;
            --verde-abrir: #00ff41;
            /* Color para el botón de reabrir */
        }

        body {
            background-color: var(--negro-fondo);
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        /* EFECTO DIFUMINADO AL ABRIR MODAL */
        body.modal-open .main-content {
            filter: blur(8px);
            transition: filter 0.3s ease;
        }

        .modal-backdrop {
            backdrop-filter: blur(10px);
            background-color: rgba(0, 0, 0, 0.8) !important;
        }

        /* ESTILO DEL MODAL */
        .modal-content {
            background-color: var(--negro-card) !important;
            border: 2px solid var(--rojo-neon) !important;
            border-radius: 20px;
        }

        .header-rojo {
            background-color: var(--rojo-neon);
            padding: 15px;
            border-radius: 15px 15px 0 0;
        }

        .header-rojo h5 {
            color: #000000 !important;
            font-weight: 800;
            margin: 0;
        }

        /* INPUTS */
        .form-control {
            background-color: white;
            border: 1px solid #333 !important;
            color: #000000 !important;
            border-radius: 10px;
        }

        .form-select {
            background-color: var(--input-bg) !important;
            border: 1px solid #333 !important;
            color: #ffffff !important;
            border-radius: 10px;
        }

        .form-control:focus {
            border-color: var(--rojo-neon) !important;
            box-shadow: 0 0 8px rgba(255, 0, 0, 0.3) !important;
        }

        /* ESTILO UNIFICADO DE BOTONES (Letra negra) */
        .btn-action {
            font-weight: 800 !important;
            text-transform: uppercase;
            border: none !important;
            color: #000000 !important;
            padding: 12px;
            border-radius: 10px;
            transition: 0.3s;
            font-size: 0.8rem;
        }

        .btn-finalizar {
            background-color: var(--rojo-neon) !important;
        }

        .btn-editar {
            background-color: #ffffff !important;
        }

        .btn-anular {
            background-color: #cc0000 !important;
        }

        .btn-abrir {
            background-color: var(--verde-abrir) !important;
        }

        .btn-action:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }

        /* CARDS */
        .card-cita {
            background-color: var(--negro-card);
            border: 1px solid #222;
            border-radius: 15px;
            transition: 0.3s;
            color: white;
        }

        .card-cita:hover {
            border-color: var(--rojo-neon);
        }

        .img-mascota {
            width: 75px;
            height: 75px;
            border-radius: 15px;
            border: 2px solid var(--rojo-neon);
            object-fit: cover;
        }

        .text-muted {
            --bs-text-opacity: 1;
            color: rgba(255, 255, 255, 0.75) !important;
        }
    </style>
</head>

<body>

    <div class="main-content container mt-4">
        <h2 class="text-center mb-4">🏥 Citas<span style="color: var(--rojo-neon);"> VET</span></h2>

        <div class="row mb-4 align-items-center p-3 rounded-4"
            style="background: var(--negro-card); border: 1px solid #222;">
            <div class="col-md-4">
                <label class="form-label small fw-bold">FILTRAR POR ESTADO:</label>
                <select id="filtroEstado" class="form-select" onchange="renderizarCitas()">
                    <option value="Abierta">ABIERTAS</option>
                    <option value="Terminada">TERMINADAS</option>
                    <option value="Anulada">ANULADAS</option>
                </select>
            </div>
            <div class="col-md-8 text-end pt-4">
                <button class="btn btn-action btn-finalizar px-4" onclick="abrirModal()">+ AGREGAR CITA</button>
            </div>
        </div>

        <div id="contenedorCitas" class="row"></div>
    </div>

    <div class="modal fade" id="modalCita" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="header-rojo d-flex justify-content-between align-items-center">
                    <h5 id="tituloModal">NUEVA CITA</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                   <form id="formCita" novalidate>
                        <input type="hidden" id="editId">
                        <input type="text" id="nombreMascota" class="form-control mb-3"
                            placeholder="Nombre de la mascota" required>
                        <input type="text" id="propietario" class="form-control mb-3" placeholder="Nombre del dueño"
                            required>
                        <input type="tel" id="telefono" class="form-control mb-3" placeholder="Teléfono" required>

                        <div class="row mb-3">
                            <div class="col">
                                <label class="small fw-bold">FECHA</label>
                                <input type="date" id="fecha" class="form-control" required>
                            </div>
                            <div class="col">
                                <label class="small fw-bold">HORA</label>
                                <input type="time" id="hora" class="form-control" required>
                            </div>
                        </div>

                        <select id="tipoMascota" class="form-select mb-3" required>
                            <option value="">Tipo de animal</option>
                            <option>Perro</option>
                            <option>Gato</option>
                            <option>Loro</option>
                            <option>Conejo</option>
                            <option>Hamster</option>
                            <option>Tortuga</option>
                            <option>Iguana</option>
                            <option>Serpiente</option>
                            <option>Pez</option>
                            <option>Caballo</option>
                            <option>Hurón</option>
                            <option>Cerdo</option>
                            <option>Gallina</option>
                        </select>


                        <textarea id="sintomas" class="form-control mb-4" rows="3" placeholder="Síntomas detectados..."
                            required></textarea>

                        <div class="d-flex gap-2">
                            <button type="button" class="btn btn-action btn-editar w-50"
                                data-bs-dismiss="modal">CANCELAR</button>
                            <button type="submit" class="btn btn-action btn-finalizar w-50">CONFIRMAR</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

   <script>
    // Lógica de GIFs
    const gifsMascotas = {
        "Perro": "https://www.gifss.com/animales/perros/images/perro-animado-12.gif",
        "Gato": "https://http2.mlstatic.com/D_NQ_NP_949345-CBT83443420984_042025-O.webp7",
        "Loro": "https://usagif.com/wp-content/uploads/2020/b72nv6/partyparrt-9.gif",
        "Conejo":"https://media.tenor.com/woAPbK0qj5gAAAAM/%E0%B8%AD%E0%B8%B4%E0%B8%AD%E0%B8%B4-snowball.gif",
        "Hamster":"https://www.gifsanimados.org/data/media/517/hamster-imagen-animada-0131.gif",
        "Tortuga":"https://media.tenor.com/Ocbnn2GxVDgAAAAM/turtle-cute.gif",
        "Iguana":"https://media.tenor.com/ImJrgYCFUkcAAAAM/cryptid-folklore.gif",
        "Serpiente":"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTVRP21wZMT0HHW-q5qzEYRaxF2SD7E_MZN_g&s",
        "Pez":"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSRuWO3LfXoNNBYZtOANec_57C3X4BImWTh2A&s",
        "Caballo":"https://img1.picmix.com/output/stamp/normal/4/8/9/9/529984_506ce.gif",
        "Hurón":"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRbgIpLRX_p_v3qmYzvus6AkrlcsxYnmjukeA&s",
        "Cerdo":"https://media.tenor.com/AXl4_5OBDDwAAAAM/pig.gif",
        "Gallina":"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTYTZjnDzGShvU8tF2byF7ZgQblmjnpwDuYRw&s",
    };

    let citas = JSON.parse(localStorage.getItem('citas_vet')) || [];
    const modalBootstrap = new bootstrap.Modal(document.getElementById('modalCita'));

    //  BLOQUEAR FECHAS PASADAS
    const inputFecha = document.getElementById('fecha');
    const hoy = new Date().toISOString().split('T')[0];
    inputFecha.setAttribute('min', hoy);

    //  BLOQUEAR DOMINGOS AL CAMBIAR FECHA
    inputFecha.addEventListener('change', function () {
        const dia = new Date(this.value + 'T00:00:00').getDay();
        if (dia === 0) {
            Swal.fire({
                icon: 'warning',
                title: 'Domingos cerrados',
                text: 'La veterinaria no atiende los domingos'
            });
            this.value = '';
        }
    });

    function abrirModal(id = null) {
        document.getElementById('formCita').reset();
        document.getElementById('editId').value = id || '';
        document.getElementById('tituloModal').innerText = id ? 'EDITAR CITA' : 'NUEVA CITA';

        if (id) {
            const c = citas.find(cita => cita.id == id);
            document.getElementById('nombreMascota').value = c.mascota;
            document.getElementById('propietario').value = c.propietario;
            document.getElementById('telefono').value = c.telefono;
            document.getElementById('fecha').value = c.fecha;
            document.getElementById('hora').value = c.hora;
            document.getElementById('tipoMascota').value = c.tipo;
            document.getElementById('sintomas').value = c.sintomas;
        }
        modalBootstrap.show();
    }
document.getElementById('formCita').addEventListener('submit', function (e) {
    e.preventDefault();

    const mascota = document.getElementById('nombreMascota').value.trim();
    const propietario = document.getElementById('propietario').value.trim();
    const telefono = document.getElementById('telefono').value.trim();
    const fecha = document.getElementById('fecha').value;
    const horaInput = document.getElementById('hora').value;
    const tipo = document.getElementById('tipoMascota').value;
    const sintomas = document.getElementById('sintomas').value.trim();

    if (!mascota || !propietario || !telefono || !fecha || !horaInput || !tipo || !sintomas) {
        Swal.fire({
            icon: 'warning',
            title: 'Campos incompletos',
            text: 'Por favor completa todos los campos antes de continuar',
            confirmButtonColor: '#ff0000'
        });
        return;
    }

        const fechaSeleccionada = document.getElementById('fecha').value;
        const dia = new Date(fechaSeleccionada + 'T00:00:00').getDay();

        //  VALIDAR DOMINGO AL GUARDAR
        if (dia === 0) {
            Swal.fire({
                icon: 'error',
                title: 'Día no disponible',
                text: 'La veterinaria no atiende los domingos'
            });
            return;
        }

        const horaSeleccionada = document.getElementById('hora').value;
        const [hora, minutos] = horaSeleccionada.split(':').map(Number);

        //  VALIDAR HORARIO
        if (hora < 8 || hora > 20 || (hora === 20 && minutos > 0)) {
            Swal.fire({
                icon: 'error',
                title: 'Horario no permitido',
                text: 'Solo se pueden agendar citas entre 8:00 AM y 8:00 PM'
            });
            return;
        }

        const idEdit = document.getElementById('editId').value;

        const datos = {
            mascota: document.getElementById('nombreMascota').value,
            propietario: document.getElementById('propietario').value,
            telefono: document.getElementById('telefono').value,
            fecha: fechaSeleccionada,
            hora: horaSeleccionada,
            tipo: document.getElementById('tipoMascota').value,
            sintomas: document.getElementById('sintomas').value,
            estado: 'Abierta'
        };

        if (idEdit) {
            citas = citas.map(c => c.id == idEdit ? { ...datos, id: parseInt(idEdit), estado: c.estado } : c);
        } else {
            datos.id = Date.now();
            citas.push(datos);
        }

        localStorage.setItem('citas_vet', JSON.stringify(citas));
        renderizarCitas();
        modalBootstrap.hide();
    });

    function renderizarCitas() {
        const contenedor = document.getElementById('contenedorCitas');
        contenedor.innerHTML = '';
        const filtro = document.getElementById('filtroEstado').value;
        const filtradas = citas.filter(c => c.estado === filtro);

        filtradas.forEach(c => {
            let botones = '';

            if (c.estado === 'Abierta') {
                botones = `
                <button onclick="cambiarEstado(${c.id},'Terminada')" class="btn-action btn-finalizar w-100 mb-2">FINALIZAR</button>
                <div class="d-flex gap-2">
                    <button onclick="abrirModal(${c.id})" class="btn-action btn-editar flex-fill">EDITAR</button>
                    <button onclick="cambiarEstado(${c.id},'Anulada')" class="btn-action btn-anular flex-fill">ANULAR</button>
                </div>`;
            } else if (c.estado === 'Terminada') {
                botones = `
                <button onclick="cambiarEstado(${c.id},'Abierta')" class="btn-action btn-abrir w-100 mb-2">ABRIR CITA</button>
                <button onclick="borrarCita(${c.id})" class="btn-action btn-anular w-100">ELIMINAR</button>`;
            } else {
                botones = `<button onclick="borrarCita(${c.id})" class="btn-action btn-anular w-100">BORRAR DEFINITIVO</button>`;
            }

            contenedor.innerHTML += `
        <div class="col-md-6 col-lg-4 mb-4">
            <div class="card card-cita p-3 h-100">
                <div class="d-flex justify-content-between mb-3">
                    <div>
                        <h4 class="fw-bold m-0" style="color: var(--rojo-neon)">${c.mascota}</h4>
                        <small class="text-muted">ID: ${c.id}</small>
                    </div>
                    <img src="${gifsMascotas[c.tipo] || ''}" class="img-mascota">
                </div>
                <p class="small mb-1"><strong class="text-muted">DUEÑO:</strong> ${c.propietario}</p>
                <p class="small mb-2"><strong class="text-muted">FECHA:</strong> ${c.fecha} | ${c.hora}</p>
                <div class="p-2 rounded mb-3" style="background:#000; font-size:0.85rem; border-left:3px solid var(--rojo-neon)">
                    ${c.sintomas}
                </div>
                <div class="mt-auto">
                    ${botones}
                </div>
            </div>
        </div>`;
        });
    }

    function cambiarEstado(id, nuevo) {
        citas = citas.map(c => c.id === id ? { ...c, estado: nuevo } : c);
        localStorage.setItem('citas_vet', JSON.stringify(citas));
        renderizarCitas();
    }

    function borrarCita(id) {
        citas = citas.filter(c => c.id !== id);
        localStorage.setItem('citas_vet', JSON.stringify(citas));
        renderizarCitas();
    }

    renderizarCitas();
</script>

</body>


</html>
